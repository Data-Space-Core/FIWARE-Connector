apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: fiware-dsc
  namespace: argocd
spec:
  description: FIWARE Data Space Connector deployment for tenant clusters
  sourceRepos:
    - https://github.com/Data-Space-Core/FIWARE-Connector.git
    - https://fiware.github.io/data-space-connector/
  destinations:
    - namespace: fiware-dsc
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
