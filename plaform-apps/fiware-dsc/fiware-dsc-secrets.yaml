type: Opaque
stringData:
  postgres-admin-password: fiwareuser
  postgres-user-password: password

---
apiVersion: v1
kind: Secret
metadata:
  name: issuance-secret
  namespace: fiware-dsc
type: Opaque
stringData:
  keycloak-admin: admin
  keycloak-password: password

---
apiVersion: v1
kind: Secret
metadata:
  name: kc-keystore
  namespace: fiware-dsc
