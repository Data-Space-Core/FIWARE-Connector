---
apiVersion: v1
kind: Secret
metadata:
  name: authentication-database-secret
  namespace: fiware-dsc
type: Opaque
stringData:
  mysql-root-password: password
  mysql-password: password
  mysql-replication-password: password

---
apiVersion: v1
kind: Secret
metadata:
  name: database-secret
