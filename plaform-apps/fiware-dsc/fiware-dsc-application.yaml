apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fiware-dsc-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: fiware-dsc
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: fiware-dsc-etcd-jwt-token
      namespace: fiware-dsc
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: apisixclusterconfigs.apisix.apache.org
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: apisixconsumers.apisix.apache.org
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: apisixglobalrules.apisix.apache.org
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: apisixpluginconfigs.apisix.apache.org
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: apisixroutes.apisix.apache.org
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: apisixtlses.apisix.apache.org
  sources:
    - repoURL: https://fiware.github.io/data-space-connector/
      chart: data-space-connector
      targetRevision: 8.5.2
      helm:
        releaseName: fiware-dsc
        valueFiles:
          - $values/plaform-apps/fiware-dsc/values.yaml
    - repoURL: https://github.com/Data-Space-Core/FIWARE-Connector.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: fiware-dsc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipHooks=true
